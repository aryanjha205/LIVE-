<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Live+ | Premium IPTV Player</title>
    <!-- PWA Settings -->
    <meta name="theme-color" content="#000000">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/static/icon-192.png">
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    
    <style>
        :root {
            --primary: #3b82f6;
            --accent: #22d3ee;
            --bg: #0a0a0b;
            --surface: #121214;
        }

        * {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: white;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        h1, h2, h3 {
            font-family: 'Outfit', sans-serif;
        }

        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .mx-gradient {
            background: linear-gradient(135deg, var(--primary), var(--accent));
        }

        /* Video Player Styles */
        #player-container {
            position: relative;
            width: 100%;
            height: 100%;
            background: black;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .controls-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.4), transparent 20%, transparent 80%, rgba(0,0,0,0.6));
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            opacity: 1;
            transition: opacity 0.3s ease;
            z-index: 10;
        }

        .controls-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .slider-v {
            writing-mode: bt-lr; /* IE */
            -webkit-appearance: slider-vertical; /* WebKit */
            appearance: slider-vertical;
            width: 8px;
            height: 100px;
        }

        .channel-list {
            transition: transform 0.3s ease-in-out;
            z-index: 50;
        }

        .channel-list.closed {
            transform: translateX(-100%);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
        }

        /* Ripple Effect */
        .ripple {
            position: absolute;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            transform: scale(0);
            animation: ripple 0.6s linear;
            pointer-events: none;
        }

        @keyframes ripple {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }
    </style>
</head>
<body class="flex flex-col h-screen">

    <!-- Loading Screen -->
    <div id="loading" class="fixed inset-0 z-[100] bg-black flex flex-col items-center justify-center space-y-4">
        <div class="w-16 h-16 border-4 border-blue-500/20 border-t-blue-500 rounded-full animate-spin"></div>
        <h2 class="text-xl font-bold tracking-wider text-blue-500">LIVE+</h2>
    </div>

    <!-- Main Player View -->
    <div id="player-container" class="flex-grow overflow-hidden group">
        <video id="video" playsinline></video>

        <!-- Controls UI -->
        <div id="controls" class="controls-overlay p-4">
            <!-- Top Bar -->
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <button id="menu-btn" class="p-2 rounded-full hover:bg-white/10 transition">
                        <i data-lucide="menu" class="w-6 h-6"></i>
                    </button>
                    <div class="flex flex-col">
                        <span id="current-channel-name" class="text-lg font-semibold truncate max-w-[200px] md:max-w-md">No Channel Selected</span>
                        <span class="text-xs text-blue-400 font-medium">LIVE STREAM</span>
                    </div>
                </div>
                <div class="flex items-center space-x-2">
                    <button onclick="toggleRotate()" class="p-3 rounded-full hover:bg-white/10 transition">
                        <i data-lucide="rotate-cw" class="w-5 h-5 text-white/80"></i>
                    </button>
                    <button onclick="togglePiP()" class="p-3 rounded-full hover:bg-white/10 transition">
                        <i data-lucide="picture-in-picture-2" class="w-5 h-5 text-white/80"></i>
                    </button>
                    <button onclick="toggleFullScreen()" class="p-3 rounded-full hover:bg-white/10 transition">
                        <i data-lucide="maximize" class="w-5 h-5 text-white/80" id="fs-icon"></i>
                    </button>
                </div>
            </div>

            <!-- Center Controls -->
            <div class="flex items-center justify-center space-x-8 md:space-x-16">
                <button onclick="skip(-10)" class="p-4 rounded-full hover:bg-white/10 transition">
                    <i data-lucide="rotate-ccw" class="w-8 h-8 md:w-10 md:h-10"></i>
                </button>
                <button id="play-pause-btn" class="w-16 h-16 md:w-20 md:h-20 flex items-center justify-center rounded-full bg-blue-600 shadow-xl shadow-blue-500/20 hover:scale-105 transition-all active:scale-95">
                    <i data-lucide="play" class="w-8 h-8 md:w-10 md:h-10 fill-white" id="main-play-icon"></i>
                </button>
                <button onclick="skip(10)" class="p-4 rounded-full hover:bg-white/10 transition">
                    <i data-lucide="rotate-cw" class="w-8 h-8 md:w-10 md:h-10"></i>
                </button>
            </div>

            <!-- Bottom Bar -->
            <div class="space-y-4">
                <!-- Volume & Brightness Vertical Indicators (On Sides) -->
                <div class="flex justify-between items-end absolute inset-x-4 bottom-24 pointer-events-none">
                    <div id="brightness-indicator" class="flex flex-col items-center space-y-2 opacity-0 transition-opacity">
                        <div class="w-1.5 h-32 bg-white/20 rounded-full overflow-hidden relative">
                            <div id="brightness-bar" class="absolute bottom-0 w-full bg-white transition-all" style="height: 100%;"></div>
                        </div>
                        <i data-lucide="sun" class="w-4 h-4"></i>
                    </div>
                    <div id="volume-indicator" class="flex flex-col items-center space-y-2 opacity-0 transition-opacity">
                        <div class="w-1.5 h-32 bg-white/20 rounded-full overflow-hidden relative">
                            <div id="volume-bar" class="absolute bottom-0 w-full bg-blue-500 transition-all" style="height: 80%;"></div>
                        </div>
                        <i data-lucide="volume-2" class="w-4 h-4"></i>
                    </div>
                </div>

                <!-- Seek Bar (Simulated for Live) -->
                <div class="relative w-full h-1 bg-white/20 rounded-full group/seek cursor-pointer overflow-hidden">
                    <div class="absolute left-0 top-0 h-full bg-blue-600 w-full opacity-60"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Side Menu / Channel List -->
    <div id="sidebar" class="channel-list closed fixed inset-y-0 left-0 w-full max-w-[320px] glass flex flex-col">
        <div class="p-6 border-b border-white/10 flex items-center justify-between">
            <h2 class="text-2xl font-bold italic tracking-tighter text-blue-500">LIVE+</h2>
            <button id="close-menu" class="p-2 rounded-full hover:bg-white/10">
                <i data-lucide="x" class="w-6 h-6"></i>
            </button>
        </div>
        
        <!-- Search -->
        <div class="p-4">
            <div class="relative">
                <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-white/40"></i>
                <input type="text" id="search-input" placeholder="Search channels..." class="w-full bg-white/5 border border-white/10 rounded-xl py-2.5 pl-10 pr-4 text-sm focus:outline-none focus:border-blue-500 transition-all">
            </div>
        </div>

        <!-- Channels Grid -->
        <div id="channels-container" class="flex-grow overflow-y-auto p-4 space-y-2">
            <!-- Channels will be injected here -->
        </div>
    </div>

    <!-- Toast UI -->
    <div id="toast" class="fixed top-8 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full bg-blue-600/90 text-white font-medium text-sm glass opacity-0 transition-all z-[200] pointer-events-none">
        Channel Loaded
    </div>

    <script src="/static/js/main.js"></script>
</body>
</html>
